name: Update Dinesafe Data

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily (04:00 EDT / 03:00 EST)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r _requirements.txt

      - name: Fetch and process Dinesafe data
        run: python _preprocess.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/establishments.json
          git diff --staged --quiet || git commit -m "chore: update dinesafe data"
          git push
