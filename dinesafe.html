<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toronto Dinesafe Data UI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { height: 100%; width: 100%; }

    #legend {
      position: absolute;
      bottom: 30px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.35);
      font: 13px/1.6 Arial, sans-serif;
    }
    #legend h4 { margin-bottom: 6px; font-size: 13px; }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 50%;
      flex-shrink: 0; opacity: 0.9;
    }

    #status-bar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      padding: 5px 12px;
      border-radius: 4px;
      font: 12px Arial, sans-serif;
      pointer-events: none;
      white-space: nowrap;
    }

    #list-btn {
      position: absolute;
      bottom: 30px;
      left: 10px;
      z-index: 1000;
      background: white;
      border: 2px solid rgba(0,0,0,0.2);
      padding: 5px 10px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
      font: 16px/1 Arial, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      touch-action: manipulation;
    }
    #list-btn:hover { background: #f0f0f0; }
    #list-btn .list-icon { font-size: 15px; }

    #list-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 100%;
      z-index: 1001;
      background: white;
      box-shadow: 3px 0 10px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    #list-panel.open { transform: translateX(0); }

    #list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #e0e0e0;
      font: bold 14px Arial, sans-serif;
      flex-shrink: 0;
    }
    #list-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      color: #555;
    }
    #list-close:hover { color: #000; }

    #list-search {
      margin: 10px 10px 6px;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font: 16px Arial, sans-serif;
      outline: none;
      flex-shrink: 0;
    }
    #list-search:focus { border-color: #2196F3; }

    #list-count {
      padding: 2px 10px 6px;
      font: 11px Arial, sans-serif;
      color: #888;
      flex-shrink: 0;
    }

    #list-items {
      flex: 1;
      overflow-y: auto;
      border-top: 1px solid #efefef;
    }
    .list-item {
      padding: 9px 14px 9px 10px;
      border-bottom: 1px solid #f0f0f0;
      border-left: 4px solid transparent;
      cursor: pointer;
    }
    .list-item:hover { background: #f7f7f7; }
    .list-item-name {
      font: 600 13px Arial, sans-serif;
      margin-bottom: 2px;
      word-break: break-word;
    }
    .list-item-addr {
      font: 11px Arial, sans-serif;
      color: #777;
    }
    .list-empty {
      padding: 24px 14px;
      text-align: center;
      color: #aaa;
      font: 13px Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="legend">
  <h4>Inspection history</h4>
  <div class="legend-row"><div class="legend-dot" style="background:#4CAF50"></div> All Pass</div>
  <div class="legend-row"><div class="legend-dot" style="background:#FF9800"></div> Conditional Pass</div>
  <div class="legend-row"><div class="legend-dot" style="background:#F44336"></div> Closed</div>
</div>

<div id="status-bar">Loading data…</div>

<button id="list-btn" title="Show restaurant list">
  <span class="list-icon">&#9776;</span> List
</button>

<div id="list-panel">
  <div id="list-header">
    <span>Restaurants in view</span>
    <button id="list-close" title="Close">&#x2715;</button>
  </div>
  <input type="text" id="list-search" placeholder="Search by name…" autocomplete="off">
  <div id="list-count"></div>
  <div id="list-items"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
  const STATUS_COLORS = {
    'Pass': '#4CAF50',
    'Conditional Pass': '#FF9800',
    'Closed': '#F44336',
  };

  const map = L.map('map').setView([43.7, -79.4], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  const clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
  map.addLayer(clusterGroup);

  const statusBar = document.getElementById('status-bar');
  const listBtn = document.getElementById('list-btn');
  const listPanel = document.getElementById('list-panel');
  const listClose = document.getElementById('list-close');
  const listSearch = document.getElementById('list-search');
  const listCount = document.getElementById('list-count');
  const listItems = document.getElementById('list-items');

  let allFeatures = [];
  let currentViewFeatures = [];
  const featureMarkerMap = new Map();

  function colorFor(status) {
    return STATUS_COLORS[status] || '#888888';
  }

  function updateMarkers() {
    clusterGroup.clearLayers();
    const bounds = map.getBounds();
    const layers = [];
    currentViewFeatures = [];
    featureMarkerMap.clear();

    for (const feature of allFeatures) {
      const [lng, lat] = feature.geometry.coordinates;
      if (!bounds.contains([lat, lng])) continue;

      const p = feature.properties;
      const color = colorFor(p.worstStatus);

      const marker = L.circleMarker([lat, lng], {
        radius: 7,
        color: color,
        fillColor: color,
        fillOpacity: 0.85,
        weight: 1,
      });

      marker.bindPopup(
        `<b>${p.estName}</b><br>` +
        `${p.address}<br><br>` +
        `Status: <b style="color:${color}">${p.worstStatus}</b><br>` +
        `Pass: ${p.pass_count} &nbsp;|&nbsp; ` +
        `Cond.: ${p.conditional_count} &nbsp;|&nbsp; ` +
        `Closed: ${p.closed_count}<br>` +
        `Last inspected: ${p.lastInspection}`
      );

      featureMarkerMap.set(feature, marker);
      currentViewFeatures.push(feature);
      layers.push(marker);
    }

    clusterGroup.addLayers(layers);
    statusBar.textContent = `${layers.length} establishment${layers.length !== 1 ? 's' : ''} in view`;

    if (listPanel.classList.contains('open')) renderList(listSearch.value);
  }

  function renderList(query) {
    const q = (query || '').trim().toLowerCase();
    const filtered = q
      ? currentViewFeatures.filter(f => f.properties.estName.toLowerCase().includes(q))
      : currentViewFeatures;

    listCount.textContent = `${filtered.length} of ${currentViewFeatures.length} establishment${currentViewFeatures.length !== 1 ? 's' : ''}`;
    listItems.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'list-empty';
      empty.textContent = q ? 'No matches found' : 'No establishments in view';
      listItems.appendChild(empty);
      return;
    }

    filtered.forEach(feature => {
      const p = feature.properties;
      const color = colorFor(p.worstStatus);
      const item = document.createElement('div');
      item.className = 'list-item';
      item.style.borderLeftColor = color;
      item.innerHTML =
        `<div class="list-item-name">${p.estName}</div>` +
        `<div class="list-item-addr">${p.address}</div>`;
      item.addEventListener('click', () => {
        const marker = featureMarkerMap.get(feature);
        if (marker) clusterGroup.zoomToShowLayer(marker, () => marker.openPopup());
      });
      listItems.appendChild(item);
    });
  }

  function openPanel() {
    listPanel.classList.add('open');
    listSearch.value = '';
    renderList('');
    listSearch.focus();
  }

  function closePanel() {
    listPanel.classList.remove('open');
  }

  listBtn.addEventListener('click', openPanel);
  listClose.addEventListener('click', closePanel);
  listSearch.addEventListener('input', () => renderList(listSearch.value));

  async function loadData() {
    try {
      const resp = await fetch('data/establishments.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const fc = await resp.json();
      allFeatures = fc.features;
      statusBar.textContent = `${allFeatures.length} establishments loaded`;
      updateMarkers();
      map.on('moveend', updateMarkers);
    } catch (err) {
      statusBar.textContent = 'Error loading data';
      console.error(err);
    }
  }

  loadData();
</script>
</body>
</html>
